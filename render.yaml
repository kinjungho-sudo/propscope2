services:
  - type: web
    name: propscope-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: propscope-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MOLIT_API_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false

databases:
  - name: propscope-db
    databaseName: propscope
    user: propscope
    plan: free
