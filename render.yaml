services:
  - type: web
    name: propscope-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: propscope-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: api/v1
      - key: MOLIT_API_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        value: 882a712230678852cb0e6c255561ea08
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h

databases:
  - name: propscope-db
    databaseName: propscope
    user: propscope
    plan: free
